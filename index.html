<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Inventario Tecnológico
</title>

<link
rel="stylesheet"
href="estilos.css">

</head>

<body>

<header>

<div class="encabezado">

<img
src="img/tecn.jpg"
alt="Logo"
class="logo">

<div>

<h1>
Inventario Tecnológico
</h1>

<p>
Sistema de gestión y registro de productos
</p>

</div>

</div>

</header>

<section class="contenedor">

<form id="formulario">

<input
type="text"
id="codigo"
placeholder="Código del producto">

<input
type="text"
id="nombre"
placeholder="Nombre del producto">

<input
type="text"
id="categoria"
placeholder="Categoría">

<input
type="number"
id="precio"
placeholder="Precio">

<input
type="number"
id="cantidad"
placeholder="Cantidad disponible">

<div class="botones">

<button
type="button"
onclick="guardar()">

Guardar

</button>

<button
type="reset">

Limpiar

</button>

<button
type="button"
onclick="buscar()">

Buscar

</button>

</div>

</form>

<table>

<thead>

<tr>

<th>Código</th>

<th>Nombre</th>

<th>Categoría</th>

<th>Precio</th>

<th>Cantidad</th>

</tr>

</thead>

<tbody id="tablaProductos">

</tbody>

</table>

</section>

<script src="app.js"></script>

</body>

</html>
